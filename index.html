// 把 "1 顆" 拆成 { num:1, unit:"顆" };無法判讀數字時 num 為 null
const parseAmount = (q) => {
  const m = (q || "").match(/^\s*([\d.]+)\s*(.*)$/);
  if (m && !isNaN(parseFloat(m[1]))) return { num: parseFloat(m[1]), unit: m[2].trim() };
  return { num: null, unit: (q || "").trim() };
};

// 依使用食材分類做營養評分
const PROTEIN = new Set(["meat", "sea", "egg"]);
const nutrition = (dishes) => {
  const cats = new Set();
  let count = 0;
  dishes.forEach((d) => dishUses(d).forEach((u) => { if (u.cat) { cats.add(u.cat); count++; } }));
  if (count === 0) return null;
  const hasVeg = cats.has("veg");
  const hasProt = [...cats].some((c) => PROTEIN.has(c));
  const hasStap = cats.has("stap");
  let score = 22;
  if (hasVeg) score += 28;
  if (hasProt) score += 28;
  if (hasStap) score += 14;
  score += Math.min(8, Math.max(0, cats.size - 1) * 3);
  score = Math.min(100, Math.round(score));
  const grade = score >= 88 ? "A" : score >= 72 ? "B" : score >= 56 ? "C" : "D";
  const verdict = score >= 88 ? "營養相當均衡,很棒" : score >= 72 ? "整體不錯" : score >= 56 ? "尚可" : "菜色偏單一";
  const tips = [];
  if (!hasVeg) tips.push("加點蔬菜更均衡");
  if (!hasProt) tips.push("補充蛋白質(肉/魚/蛋)更有飽足感");
  if (!hasStap) tips.push("配點主食補充能量");
  const comment = tips.length ? `${verdict},${tips.join("、")}。` : `${verdict},三大類都有了 👍`;
  return { score, grade, comment, hasVeg, hasProt, hasStap };
};
const gradeColor = (g) => ({ A: "#16B9A6", B: "#7FB83E", C: "#FFB020", D: "#FF6B5E" }[g] || "#7FB83E");
function CountUp({ value, dur = 650 }) {
  const [n, setN] = useState(0);
  useEffect(() => {
    let raf, start; const to = Number(value) || 0;
    const tick = (t) => { if (!start) start = t; const p = Math.min(1, (t - start) / dur);
      setN(Math.round(to * (1 - Math.pow(1 - p, 3)))); if (p < 1) raf = requestAnimationFrame(tick); };
    raf = requestAnimationFrame(tick); return () => cancelAnimationFrame(raf);
  }, [value]);
  return <>{n}</>;
}

const dayHue = () => { const h = new Date().getHours();
  return h < 6 ? "180deg" : h < 11 ? "-8deg" : h < 16 ? "18deg" : h < 19 ? "-28deg" : "170deg"; };

  sea: { kcal: 110, p: 20, c: 1, f: 2 }, egg: { kcal: 155, p: 13, c: 1, f: 11 },
  stap: { kcal: 140, p: 4, c: 30, f: 0.5 }, sauce: { kcal: 120, p: 1, c: 8, f: 8 },
  etc: { kcal: 90, p: 3, c: 12, f: 2 },
};
const UNITG = { g: 1, "克": 1, "公克": 1, kg: 1000, "公斤": 1000, "台斤": 600, "兩": 37.5 };
const gramsOf = (u) => {
  const amt = u.amount > 0 ? u.amount : 1;          // 沒填數量 → 當作 1 份
  const unit = (u.unit || "").trim();
  if (UNITG[unit]) return amt * UNITG[unit];
  return amt * 100;                                  // 顆/個/份/包等 → 概略每份 100g
};
const estimateNutrients = (dishes) => {
  let kcal = 0, p = 0, c = 0, f = 0, n = 0;
  dishes.forEach((d) => dishUses(d).forEach((u) => {
    const db = FOODDB.find((x) => x.k.some((k) => (u.name || "").includes(k))) || CATDB[u.cat] || CATDB.etc;
    const r = gramsOf(u) / 100;
    kcal += db.kcal * r; p += db.p * r; c += db.c * r; f += db.f * r; n++;
  }));
  if (n === 0) return null;
  return { kcal: Math.round(kcal), p: Math.round(p), c: Math.round(c), f: Math.round(f) };
};

function KitchenApp() {
  const [house, setHouse] = useState(() => localStorage.getItem("kitchen:house") || "");
  const [tab, setTab] = useState("dinner");
  const [loading, setLoading] = useState(true);
  const [inv, setInv] = useState([]);
  const [shop, setShop] = useState([]);
  const [dinners, setDinners] = useState([]);
  const refRef = React.useRef(null);

  // 訂閱雲端資料:全家同一組家庭代碼 = 同一份資料,且即時同步
  useEffect(() => {
    if (!house) return;
    setLoading(true);
    const ref = db.collection("households").doc(house);
    refRef.current = ref;
    const unsub = ref.onSnapshot(
      (snap) => {
        const d = snap.data() || {};
        setInv(d.inventory || []); setShop(d.shopping || []); setDinners(d.dinners || []);
        setLoading(false);
      },
      (err) => { console.error("Firestore 連線錯誤:", err); setLoading(false); }
    );
    return () => unsub();
  }, [house]);

  const write = (patch) => { if (refRef.current) refRef.current.set(patch, { merge: true }).catch((e) => console.error(e)); };
  const updInv = (v) => { setInv(v); write({ inventory: v }); };
  const updShop = (v) => { setShop(v); write({ shopping: v }); };
  const updDin = (v) => { setDinners(v); write({ dinners: v }); };
  const leaveHouse = () => { localStorage.removeItem("kitchen:house"); setHouse(""); };

  if (!house) {
    return <HouseholdSetup onJoin={(code) => { localStorage.setItem("kitchen:house", code); setHouse(code); }} />;
  }

  if (loading) {
    return (
      <div className="kit"><style>{CSS}</style>
        <div className="empty" style={{ paddingTop: 140 }}><div className="e">🍳</div>載入廚房中…</div>
      </div>
    );
  }

  const expiring = inv.filter((i) => { const d = daysLeft(i.exp); return d !== null && d <= 3; }).length;
  const pending = shop.filter((s) => !s.done).length;
  const todayDinner = dinners.find((d) => d.date === todayStr());

  const heads = {
    inv: { title: "食材庫存", sub: <>冰箱裡有 <b>{inv.length}</b> 樣食材{expiring > 0 && <>,<b>{expiring}</b> 樣要快用掉</>}</> },
    shop: { title: "購物清單", sub: <>還有 <b>{pending}</b> 項要買</> },
    dinner: { title: `${greet()},今晚吃什麼?`, sub: todayDinner ? <>菜單已公告 · <b>{todayDinner.dishes.length}</b> 道菜</> : <>還沒決定,來排個菜吧</> },
  };

  return (
    <div className="kit" style={{ "--glow": dayGlow(), "--aura-hue": dayHue() }}>
      <style>{CSS}</style>
      <div className="aurora" aria-hidden="true"><span className="blob b1" /><span className="blob b2" /><span className="blob b3" /><span className="blob b4" /></div>
      <header className="head">
        <div className="top">
          <span className="kicker"><span className="dot" />我家的廚房 · {house}</span>
          <button className="kicker" onClick={leaveHouse} style={{ background: "none", border: "none", color: "inherit", cursor: "pointer", opacity: .85, fontFamily: "inherit" }}>切換家庭 ⇄</button>
        </div>
        <h1 className="serif">{heads[tab].title}</h1>
        <div className="sub">{heads[tab].sub}</div>
      </header>
      <div className="body" key={tab}>
        {tab === "inv" && <Inventory inv={inv} setInv={updInv} shop={shop} setShop={updShop} expiring={expiring} />}
        {tab === "shop" && <Shopping shop={shop} setShop={updShop} inv={inv} setInv={updInv} />}
        {tab === "dinner" && <Dinner dinners={dinners} setDinners={updDin} inv={inv} setInv={updInv} />}
      </div>
      <nav className="tabbar">
        <div className="tabs">
          <span className="tabind" style={{ transform: `translateX(${["inv", "dinner", "shop"].indexOf(tab) * 100}%)` }} />
          {[
            { id: "inv", lab: "庫存", emoji: "🥬" },
            { id: "dinner", lab: "晚餐", emoji: "🍽️" },
            { id: "shop", lab: "購物", emoji: "🛒" },
          ].map(({ id, lab, emoji }) => (
            <button key={id} className={`tab ${tab === id ? "on" : ""}`} onClick={() => setTab(id)}>
              <span className="emoji">{emoji}</span>
              <span className="lab">{lab}</span>
            </button>
          ))}
        </div>
      </nav>
    </div>
  );
}

// ================= 食材庫存 =================
function Inventory({ inv, setInv, shop, setShop, expiring }) {
  const [name, setName] = useState("");
  const [qty, setQty] = useState("");
  const [cat, setCat] = useState("veg");
  const [exp, setExp] = useState("");

  const add = () => {
    if (!name.trim()) return;
    setInv([...inv, { id: uid(), name: name.trim(), qty: qty.trim(), cat, exp }]);
    setName(""); setQty(""); setExp("");
  };
  const del = (id) => setInv(inv.filter((x) => x.id !== id));
  const [editId, setEditId] = useState(null);
  const [ed, setEd] = useState({ name: "", qty: "", cat: "veg", exp: "" });
  const startEdit = (it) => { setEditId(it.id); setEd({ name: it.name, qty: it.qty || "", cat: it.cat, exp: it.exp || "" }); };
  const cancelEdit = () => setEditId(null);
  const saveEdit = () => {
    if (!ed.name.trim()) return;
    setInv(inv.map((x) => x.id === editId ? { ...x, name: ed.name.trim(), qty: ed.qty.trim(), cat: ed.cat, exp: ed.exp } : x));
    setEditId(null);
  };

  const groups = CATS.map((c) => ({ c, items: inv.filter((i) => i.cat === c.id) })).filter((g) => g.items.length);
  let idx = 0;

  return (
    <div>
      <div className="stats anim">
        <div className="stat"><div className="n serif"><CountUp value={inv.length} /></div><div className="l kicker">樣食材</div></div>
        <div className={`stat ${expiring ? "warn" : ""}`}><div className="n serif"><CountUp value={expiring} /></div><div className="l kicker">要快用掉</div></div>
      </div>

      <div className="sec"><div className="k kicker">Add item</div><h2 className="serif">新增食材</h2></div>
      <div className="card anim" style={{ padding: 15 }}>
        <div className="addbar" style={{ marginBottom: 9 }}>
          <input placeholder="食材名稱(例:雞蛋)" value={name} onChange={(e) => setName(e.target.value)}
            style={{ flex: 2 }} />
          <input placeholder="數量" value={qty} onChange={(e) => setQty(e.target.value)}
            style={{ flex: 1 }} />
        </div>
        <div className="addbar">
          <select value={cat} onChange={(e) => setCat(e.target.value)} style={{ flex: 1 }}>
            {CATS.map((c) => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
          </select>
          <input type="date" value={exp} onChange={(e) => setExp(e.target.value)} style={{ flex: 1 }} title="到期日" />
          <button className="btn btn-main" onClick={add}><Plus size={18} /></button>
        </div>
        <p style={{ fontSize: 11.5, color: "var(--soft)", margin: "11px 2px 0" }}>到期日可不填,填了會在快過期時提醒你</p>
      </div>

      {inv.length === 0 && (
        <div className="empty" style={{ marginTop: 26 }}><div className="e">🧊</div>
          <div className="et">冰箱還是空的</div>加幾樣食材,開始管理吧!</div>
      )}

      {groups.map(({ c, items }) => (
        <div key={c.id}>
          <div className="cath">
            <span className="em">{c.emoji}</span>
            <span className="nm" style={{ color: c.color }}>{c.label}</span>
            <span className="ct mono">{items.length}</span>
            <span className="rule" />
          </div>
          <div className="card">
            {items.map((it) => {
              const d = daysLeft(it.exp);
              idx++;
              if (editId === it.id) {
                return (
                  <div className="row anim" key={it.id} style={{ flexDirection: "column", alignItems: "stretch", gap: 8 }}>
                    <div className="addbar">
                      <input value={ed.name} onChange={(e) => setEd({ ...ed, name: e.target.value })} placeholder="名稱" style={{ flex: 2 }} />
                      <input value={ed.qty} onChange={(e) => setEd({ ...ed, qty: e.target.value })} placeholder="數量" style={{ flex: 1 }} />
                    </div>
                    <div className="addbar">
                      <select value={ed.cat} onChange={(e) => setEd({ ...ed, cat: e.target.value })} style={{ flex: 1 }}>
                        {CATS.map((c) => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
                      </select>
                      <input type="date" value={ed.exp} onChange={(e) => setEd({ ...ed, exp: e.target.value })} style={{ flex: 1 }} />
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <button className="btn" onClick={cancelEdit} style={{ flex: 1, padding: 10, background: "#DCE7C4", color: "var(--ink)" }}>取消</button>
                      <button className="btn btn-main" onClick={saveEdit} style={{ flex: 1, padding: 10 }}><Check size={16} /> 儲存</button>
                    </div>
                  </div>
                );
              }
              return (
                <div className="row anim" key={it.id} style={{ animationDelay: `${idx * 0.03}s` }}>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div><span className="nm">{it.name}</span>{it.qty && <span className="qty">數量：{it.qty}</span>}</div>
                    {d !== null && (
                      <span className="pill" style={{
                        background: d < 0 ? "#F6DAD3" : d <= 3 ? "#FBEBCB" : "#E1EECB",
                        color: d < 0 ? "#C0392B" : d <= 3 ? "#9A6A12" : "#5A7A3E",
                      }}>
                        {d < 0 ? <><AlertTriangle size={11} /> 已過期 {-d} 天</> : d === 0 ? "今天到期" : d <= 3 ? <><AlertTriangle size={11} /> 剩 {d} 天</> : `剩 ${d} 天`}
                      </span>
                    )}
                  </div>
                  <button className="btn btn-ghost" title="編輯" onClick={() => startEdit(it)} style={{ color: "var(--pine)" }}><Pencil size={18} /></button>
                  <button className="btn btn-ghost" title="刪除" onClick={() => del(it.id)}><Trash2 size={18} /></button>
                </div>
              );
            })}
          </div>
        </div>
      ))}
    </div>
  );
}

// ================= 購物清單 =================
function Shopping({ shop, setShop, inv, setInv }) {
  const [name, setName] = useState("");
  const [qty, setQty] = useState("");

  const add = () => {
    if (!name.trim()) return;
    setShop([...shop, { id: uid(), name: name.trim(), qty: qty.trim(), done: false }]);
    setName(""); setQty("");
  };
  const toggle = (id) => setShop(shop.map((s) => s.id === id ? { ...s, done: !s.done } : s));
  const del = (id) => setShop(shop.filter((s) => s.id !== id));

  const doneItems = shop.filter((s) => s.done);
  const [confirming, setConfirming] = useState(false);
  const [sel, setSel] = useState({});
  const [cats, setCats] = useState({});
  const openConfirm = () => {
    const init = {}, ic = {};
    doneItems.forEach((s) => { init[s.id] = true; ic[s.id] = "etc"; });
    setSel(init); setCats(ic); setConfirming(true);
  };
  const toggleSel = (id) => setSel((p) => ({ ...p, [id]: !p[id] }));
  const setCat = (id, c) => setCats((p) => ({ ...p, [id]: c }));
  const confirmMove = () => {
    const adds = doneItems.filter((s) => sel[s.id]).map((s) => ({ id: uid(), name: s.name, qty: s.qty, cat: cats[s.id] || "etc", exp: "" }));
    if (adds.length) setInv([...inv, ...adds]);
    setShop(shop.filter((s) => !s.done));
    setConfirming(false);
  };

  const sorted = [...shop].sort((a, b) => a.done - b.done);
  const pct = shop.length ? Math.round((doneItems.length / shop.length) * 100) : 0;

  return (
    <div>
      <div className="card anim" style={{ padding: 15, marginBottom: 18 }}>
        <div className="addbar">
          <input placeholder="要買的東西" value={name} onChange={(e) => setName(e.target.value)}
            style={{ flex: 2 }} />
          <input placeholder="數量" value={qty} onChange={(e) => setQty(e.target.value)}
            style={{ flex: 1 }} />
          <button className="btn btn-main" onClick={add}><Plus size={18} /></button>
        </div>
      </div>

      {shop.length === 0 && (
        <div className="empty"><div className="e">🛒</div>
          <div className="et">清單是空的</div>想到要買什麼,隨手加進來</div>
      )}

      {shop.length > 0 && (
        <>
          <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", margin: "0 2px 8px" }}>
            <span className="kicker" style={{ color: "var(--soft)" }}>採買進度</span>
            <span className="mono" style={{ fontSize: 12, color: "var(--soft)" }}>{doneItems.length} / {shop.length}</span>
          </div>
          <div className="prog"><i style={{ width: `${pct}%` }} /></div>

          <div className="card">
            {sorted.map((s, i) => (
              <div className="row anim" key={s.id} style={{ animationDelay: `${i * 0.03}s` }}>
                <div className={`chk ${s.done ? "on" : ""}`} onClick={() => toggle(s.id)}>{s.done && <Check size={16} color="#fff" strokeWidth={3} />}</div>
                <div style={{ flex: 1, opacity: s.done ? 0.4 : 1, textDecoration: s.done ? "line-through" : "none" }}>
                  <span className="nm">{s.name}</span>{s.qty && <span className="qty">數量：{s.qty}</span>}
                </div>
                <button className="btn btn-ghost" onClick={() => del(s.id)}><X size={18} /></button>
              </div>
            ))}
          </div>
        </>
      )}

      {shop.length > 0 && pct === 100 && !confirming && (
        <div className="celebrate">🎉 全部買齊了,辛苦啦!</div>
      )}

      {doneItems.length > 0 && !confirming && (
        <button className="btn btn-olive" onClick={openConfirm} style={{ width: "100%", marginTop: 16, padding: 14 }}>
          <Check size={18} /> 已買的 {doneItems.length} 項 → 加入庫存 <ArrowRight size={16} />
        </button>
      )}

      {confirming && (
        <div className="card anim" style={{ marginTop: 16, padding: 15 }}>
          <div className="kicker" style={{ color: "var(--soft)", marginBottom: 4 }}>勾選要入庫的食材,並選擇分類</div>
          <div style={{ fontSize: 11.5, color: "var(--soft)", marginBottom: 8, lineHeight: 1.5 }}>未勾選的不會加入庫存,但都會從購物清單移除</div>
          {doneItems.map((s) => (
            <div key={s.id} className="row" style={{ padding: "11px 2px", gap: 10 }}>
              <div style={{ display: "flex", alignItems: "center", gap: 12, flex: 1, minWidth: 0, cursor: "pointer" }} onClick={() => toggleSel(s.id)}>
                <div className={`chk ${sel[s.id] ? "on" : ""}`}>{sel[s.id] && <Check size={16} color="#fff" strokeWidth={3} />}</div>
                <div style={{ minWidth: 0, opacity: sel[s.id] ? 1 : 0.45 }}><span className="nm">{s.name}</span>{s.qty && <span className="qty">數量：{s.qty}</span>}</div>
              </div>
              <select value={cats[s.id] || "etc"} onChange={(e) => setCat(s.id, e.target.value)} disabled={!sel[s.id]}
                style={{ width: 108, flexShrink: 0, padding: "8px 8px", fontSize: 16, opacity: sel[s.id] ? 1 : 0.5 }}>
                {CATS.map((c) => <option key={c.id} value={c.id}>{c.emoji} {c.label}</option>)}
              </select>
            </div>
          ))}
          <div style={{ display: "flex", gap: 10, marginTop: 12 }}>
            <button className="btn" onClick={() => setConfirming(false)} style={{ flex: 1, padding: 13, background: "#DCE7C4", color: "var(--ink)" }}>取消</button>
            <button className="btn btn-olive" onClick={confirmMove} style={{ flex: 2, padding: 13 }}><Check size={18} /> 確認加入({doneItems.filter((s) => sel[s.id]).length})</button>
          </div>
        </div>
      )}
    </div>
  );
}

// ================= 今日晚餐 =================
function Dinner({ dinners, setDinners, inv, setInv }) {
  const today = todayStr();
  const todayEntry = dinners.find((d) => d.date === today);
  const [editing, setEditing] = useState(false);
  const [draft, setDraft] = useState([{ name: "", uses: [] }]);

  // 收集過去公告過的菜名(常煮排前面),並記住每道菜最近一次用過的食材
  const freq = {};
  const lastUses = {};
  dinners.forEach((d) => (d.dishes || []).forEach((dish) => {
    const nm = dishName(dish);
    freq[nm] = (freq[nm] || 0) + 1;
    if (!lastUses[nm] && dishUses(dish).length) lastUses[nm] = dishUses(dish);
  }));
  const known = Object.keys(freq).sort((a, b) => freq[b] - freq[a]);

  const clone = (arr) => arr.map((x) => ({ ...x, uses: x.uses.map((u) => ({ ...u })) }));

  const startEdit = () => {
    const base = todayEntry ? todayEntry.dishes.map((d) => ({ name: dishName(d), uses: dishUses(d).map((u) => ({ ...u })) })) : [];
    setDraft([...base, { name: "", uses: [] }]);
    setEditing(true);
  };
  const setDishName = (i, v) => {
    const next = clone(draft); next[i].name = v;
    if (i === next.length - 1 && v.trim()) next.push({ name: "", uses: [] });
    setDraft(next);
  };
  const rmDish = (i) => { const n = draft.filter((_, x) => x !== i); setDraft(n.length ? n : [{ name: "", uses: [] }]); };
  const addQuick = (name) => {
    const filled = draft.filter((d) => d.name.trim());
    if (filled.some((d) => d.name.trim() === name)) return;
    setDraft([...filled, { name, uses: (lastUses[name] || []).map((u) => ({ ...u })) }, { name: "", uses: [] }]);
  };
  const addUse = (i) => { const n = clone(draft); n[i].uses.push({ invId: "", name: "", unit: "", cat: "", amount: "" }); setDraft(n); };
  const setUse = (i, j, invId) => {
    const n = clone(draft); const it = inv.find((x) => x.id === invId);
    const unit = it ? parseAmount(it.qty).unit : "";
    n[i].uses[j] = { ...n[i].uses[j], invId, name: it ? it.name : "", unit, cat: it ? it.cat : "" };
    setDraft(n);
  };
  const setUseAmt = (i, j, v) => { const n = clone(draft); n[i].uses[j].amount = v; setDraft(n); };
  const rmUse = (i, j) => { const n = clone(draft); n[i].uses.splice(j, 1); setDraft(n); };

  const save = () => {
    const dishes = draft.filter((d) => d.name.trim()).map((d) => ({
      name: d.name.trim(),
      uses: d.uses.filter((u) => u.invId)
        .map((u) => ({ invId: u.invId, name: u.name, unit: u.unit, cat: u.cat, amount: parseFloat(u.amount) > 0 ? parseFloat(u.amount) : null })),
    }));
    const others = dinners.filter((d) => d.date !== today);
    if (dishes.length === 0) { setDinners(others); setEditing(false); return; }

    // 依使用量從庫存扣除;沒填量或庫存無數字(視為無限)則不扣;扣到 0 的食材移除
    const newInv = inv.map((it) => ({ ...it }));
    const usedIds = new Set();
    dishes.forEach((d) => d.uses.forEach((u) => {
      if (!(u.amount > 0)) return; // 沒填數量 → 不扣
      const it = newInv.find((x) => x.id === u.invId);
      if (!it) return;
      const { num, unit } = parseAmount(it.qty);
      if (num === null) return; // 庫存沒寫數量 → 視為無限,不扣
      usedIds.add(it.id);
      const left = Math.max(0, num - u.amount);
      it.qty = left <= 0 ? "0" : `${fmtNum(left)} ${unit}`.trim();
    }));
    setInv(newInv.filter((it) => !(usedIds.has(it.id) && parseAmount(it.qty).num === 0)));

    setDinners([{ date: today, dishes }, ...others].sort((a, b) => b.date.localeCompare(a.date)));
    setEditing(false);
  };

  const history = dinners.filter((d) => d.date !== today).slice(0, 14);
  const nut = todayEntry ? nutrition(todayEntry.dishes) : null;
  const est = todayEntry ? estimateNutrients(todayEntry.dishes) : null;

  if (editing) {
    const inDraft = draft.map((x) => x.name.trim());
    const quick = known.filter((n) => !inDraft.includes(n)).slice(0, 14);
    return (
      <div>
        <div className="sec" style={{ marginTop: 4 }}><div className="k kicker">Tonight's menu</div><h2 className="serif">設定今晚菜色</h2></div>

        {known.length > 0 && (
          <div style={{ marginBottom: 14 }}>
            <div className="kicker" style={{ color: "var(--soft)", margin: "0 2px 9px" }}>常用菜色 · 點一下加入</div>
            {quick.length > 0 ? (
              <div className="chips">
                {quick.map((n) => (
                  <button key={n} className="chip" onClick={() => addQuick(n)}><Plus size={12} /> {n}</button>
                ))}
              </div>
            ) : (
              <div style={{ fontSize: 12.5, color: "var(--soft)", margin: "0 2px" }}>常用菜色都加進來囉</div>
            )}
          </div>
        )}

        <datalist id="dish-options">
          {known.map((n) => <option key={n} value={n} />)}
        </datalist>

        {draft.map((d, i) => {
          const isLast = i === draft.length - 1;
          if (!d.name.trim() && isLast) {
            return (
              <div key={i} className="card" style={{ padding: 13, marginBottom: 4 }}>
                <div className="addbar" style={{ alignItems: "center", marginBottom: 0 }}>
                  <span className="midx" style={{ color: "var(--soft)", paddingTop: 0 }}>{String(i + 1).padStart(2, "0")}</span>
                  <input list="dish-options" placeholder="輸入或從清單選一道菜…" value={d.name}
                    onChange={(e) => setDishName(i, e.target.value)} style={{ flex: 1 }} />
                </div>
              </div>
            );
          }
          return (
            <div key={i} className="dishblk anim">
              <div className="addbar" style={{ alignItems: "center", marginBottom: 0 }}>
                <span className="midx" style={{ color: "var(--soft)", paddingTop: 0 }}>{String(i + 1).padStart(2, "0")}</span>
                <input list="dish-options" placeholder="菜名" value={d.name}
                  onChange={(e) => setDishName(i, e.target.value)} style={{ flex: 1 }} />
                <button className="btn btn-ghost" onClick={() => rmDish(i)}><X size={18} /></button>
              </div>
              <div className="uselbl">使用食材(公告後會從庫存扣除)</div>
              {d.uses.map((u, j) => (
                <div className="userow" key={j}>
                  <select value={u.invId} onChange={(e) => setUse(i, j, e.target.value)}>
                    <option value="">選擇庫存食材…</option>
                    {inv.map((it) => <option key={it.id} value={it.id}>{it.name}{it.qty ? `(${it.qty})` : ""}</option>)}
                  </select>
                  <input type="number" min="0" step="0.5" placeholder="量(可空)" value={u.amount}
                    onChange={(e) => setUseAmt(i, j, e.target.value)} />
                  <span className="unit">{u.unit}</span>
                  <button className="btn btn-ghost" onClick={() => rmUse(i, j)} style={{ padding: 4 }}><X size={16} /></button>
                </div>
              ))}
              {inv.length === 0
                ? <div style={{ fontSize: 11.5, color: "var(--soft)", marginTop: 2 }}>庫存還沒有食材,可先到「庫存」分頁新增</div>
                : <button className="addmini" onClick={() => addUse(i)}><Plus size={13} /> 加入食材</button>}
            </div>
          );
        })}
        <p style={{ fontSize: 11.5, color: "var(--soft)", margin: "10px 2px 0", lineHeight: 1.6 }}>菜名可打字或從下拉選單選;數量可不填——不填或庫存沒寫數量(如義大利麵)就視為無限、公告後不扣庫存。</p>

        <div style={{ display: "flex", gap: 10, marginTop: 16 }}>
          <button className="btn" onClick={() => setEditing(false)} style={{ flex: 1, padding: 14, background: "#DCE7C4", color: "var(--ink)" }}>取消</button>
          <button className="btn btn-main" onClick={save} style={{ flex: 2, padding: 14 }}><Check size={18} /> 公告今晚菜色</button>
        </div>
      </div>
    );
  }

  return (
    <div>
      {todayEntry ? (
        <>
          <div className="hero anim">
            <div className="htop">
              <div>
                <div className="kicker k2">📣 今晚菜單 · Tonight</div>
                <div className="date2 mono">{fmtDate(today)}</div>
              </div>
              <button className="btn editb" onClick={startEdit}><Pencil size={13} /> 修改</button>
            </div>
            {todayEntry.dishes.map((d, i) => (
              <div className="mitem" key={i}>
                <span className="midx">{String(i + 1).padStart(2, "0")}</span>
                <div>
                  <div className="mname serif">{dishName(d)}</div>
                  {dishUses(d).length > 0 && (
                    <div className="useline">{dishUses(d).map((u) => u.amount > 0 ? `${u.name} ${fmtNum(u.amount)}${u.unit}` : u.name).join(" · ")}</div>
                  )}
                </div>
              </div>
            ))}
          </div>

          {nut ? (
            <>
            <div className="card nut anim">
              <div className="nutscore" style={{ background: gradeColor(nut.grade) }}>
                <span className="s"><CountUp value={nut.score} /></span>
                <span className="g">{nut.grade} 級</span>
              </div>
              <div className="txt">
                <div className="h">今晚營養評分</div>
                <div className="c">{nut.comment}</div>
                <div className="tags3">
                  {[["蔬菜", nut.hasVeg], ["蛋白質", nut.hasProt], ["主食", nut.hasStap]].map(([lab, on]) => (
                    <span key={lab} className="t3" style={on
                      ? { background: "rgba(22,185,166,.16)", color: "#0E8C7E" }
                      : { background: "rgba(120,100,135,.1)", color: "#B0A7BB" }}>{on ? "✓ " : "– "}{lab}</span>
                  ))}
                </div>
              </div>
            </div>
            {est && (
              <div className="card est anim">
                <div className="row1">
                  <div className="kcal"><CountUp value={est.kcal} /><small>kcal(估算)</small></div>
                  <div className="hh">三大營養素</div>
                </div>
                {(() => {
                  const pc = est.p * 4, cc = est.c * 4, fc = est.f * 9, tot = pc + cc + fc || 1;
                  const w = (x) => `${Math.round((x / tot) * 100)}%`;
                  return (
                    <>
                      <div className="macrobar">
                        <span style={{ width: w(pc), background: "#16B9A6" }} />
                        <span style={{ width: w(cc), background: "#FFB020" }} />
                        <span style={{ width: w(fc), background: "#FF7A59" }} />
                      </div>
                      <div className="macrolg">
                        <div className="m"><i style={{ background: "#16B9A6" }} /><b>蛋白質</b> <span>{est.p}g</span></div>
                        <div className="m"><i style={{ background: "#FFB020" }} /><b>碳水</b> <span>{est.c}g</span></div>
                        <div className="m"><i style={{ background: "#FF7A59" }} /><b>脂肪</b> <span>{est.f}g</span></div>
                      </div>
                    </>
                  );
                })()}
                <div className="disc">※ 整桌概略估算:依常見食材每 100 克平均值與份量推估;份量非公克時以每份約 100g 計。僅供參考,非精確營養標示。</div>
              </div>
            )}
            </>
          ) : (
            <div className="card anim" style={{ padding: "16px 18px", marginTop: 14, display: "flex", gap: 13, alignItems: "center" }}>
              <div style={{ fontSize: 26 }}>🥗</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 2 }}>還沒有營養評分</div>
                <div style={{ fontSize: 12.5, color: "var(--soft)", lineHeight: 1.5 }}>幫每道菜加上「使用食材」就會自動算出評分與評語</div>
              </div>
              <button className="btn btn-main" onClick={startEdit} style={{ padding: "9px 13px", fontSize: 13, flexShrink: 0 }}><Plus size={15} /> 加食材</button>
            </div>
          )}
        </>
      ) : (
        <div className="card anim" style={{ padding: 30, textAlign: "center" }}>
          <div style={{ fontSize: 40, marginBottom: 10 }}>🍽️</div>
          <div style={{ fontWeight: 700, fontSize: 17, marginBottom: 5 }}>今晚還沒決定吃什麼</div>
          <div className="mono" style={{ fontSize: 12.5, color: "var(--soft)", marginBottom: 20 }}>{fmtDate(today)}</div>
          <button className="btn btn-main" onClick={startEdit} style={{ padding: "13px 24px" }}><Plus size={18} /> 公告今晚菜色</button>
        </div>
      )}

      {history.length > 0 && (
        <>
          <div className="sec"><div className="k kicker">Recently cooked</div><h2 className="serif" style={{ fontSize: 18 }}>近期菜單</h2></div>
          <div className="card">
            {history.map((d, i) => (
              <div className="row anim" key={i} style={{ alignItems: "flex-start", animationDelay: `${i * 0.03}s` }}>
                <div className="mono" style={{ minWidth: 50, fontSize: 12.5, color: "var(--pine)", fontWeight: 500, paddingTop: 1 }}>
                  {shortDate(d.date)}
                </div>
                <div style={{ flex: 1, fontSize: 14.5 }}>
                  {d.dishes.map(dishName).join("、")}
                </div>
              </div>
            ))}
          </div>
        </>
      )}
    </div>
  );
}


// ====== 家庭代碼設定畫面 ======
function HouseholdSetup({ onJoin }) {
  const [code, setCode] = useState("");
  const go = () => { const c = code.trim(); if (c) onJoin(c); };
  return (
    <div className="kit" style={{ "--glow": dayGlow(), "--aura-hue": dayHue() }}><style>{CSS}</style>
      <div className="aurora" aria-hidden="true"><span className="blob b1" /><span className="blob b2" /><span className="blob b3" /><span className="blob b4" /></div>
      <header className="head">
        <div className="top"><span className="kicker"><span className="dot" />我家的廚房 · OUR KITCHEN</span></div>
        <h1 className="serif">設定家庭代碼</h1>
        <div className="sub">全家輸入<b style={{color:"var(--lime)"}}>同一組代碼</b>,就能共用同一份資料</div>
      </header>
      <div className="body" style={{ paddingBottom: 30 }}>
        <div className="card" style={{ padding: 18 }}>
          <div className="kicker" style={{ color: "var(--soft)", marginBottom: 9 }}>家庭代碼</div>
          <input value={code} onChange={(e) => setCode(e.target.value)} placeholder="例如:lin-family-8821"
            onKeyDown={(e) => e.key === "Enter" && go()} />
          <p style={{ fontSize: 12.5, color: "var(--soft)", lineHeight: 1.7, marginTop: 11 }}>
            自訂一組<b>不容易被猜到</b>的代碼(建議混入數字)。家人各自在手機打開這個網站、輸入<b>同一組代碼</b>,就會看到同一份冰箱、清單與菜單,而且即時同步。
          </p>
          <button className="btn btn-main" onClick={go} style={{ width: "100%", padding: 14, marginTop: 4 }}>
            <Check size={18} /> 開始使用
          </button>
        </div>
      </div>
    </div>
  );
}
